    <linearGradient id="cactusGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007a3d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8ed63e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Groene achtergrond met afgeronde hoeken -->
  <rect x="10" y="10" width="80" height="80" rx="15" fill="url(#cactusGradient)" />
  
  <!-- Cactus silhouet (donkerblauw) -->
  <path d="M40 70V40c0-5 5-5 5-5h5V25c0-5 5-5 5-5s5 0 5 5v30c0 5 5 5 5 5h5v10H40z" fill="#303654" />
