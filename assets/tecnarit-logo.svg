  <!-- TECNARIT tekst in wit -->
  <g fill="#FFFFFF">
    <path d="M130 30h40v8h-16v42h-8V38h-16z" /> <!-- T -->
    <path d="M170 30h32v8h-24v12h20v8h-20v14h24v8h-32z" /> <!-- E -->
    <path d="M210 30h8l16 36.5V30h8v50h-8l-16-36.5V80h-8z" /> <!-- N -->
